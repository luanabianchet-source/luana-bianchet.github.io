  <script>
    
document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

  </script>

900;\n  font-display: swap;\n  src: url(\"c7967d37-18bc-4d5b-8b4d-a01ae161e8ef\") format('woff2');\n  unicode-range: U+0102-0103, U+0110-0111, U+0128-0129, U+0168-0169, U+01A0-01A1, U+01AF-01B0, U+0300-0301, U+0303-0304, U+0308-0309, U+0323, U+0329, U+1EA0-1EF9, U+20AB;\n}\n/* latin-ext */\n@font-face {\n  font-family: 'Nunito';\n  font-style: normal;\n  font-weight: 900;\n  font-display: swap;\n  src: url(\"77a27770-2b19-4ebb-ad59-f46798af0faf\") format('woff2');\n  unicode-range: U+0100-02BA, U+02BD-02C5, U+02C7-02CC, U+02CE-02D7, U+02DD-02FF, U+0304, U+0308, U+0329, U+1D00-1DBF, U+1E00-1E9F, U+1EF2-1EFF, U+2020, U+20A0-20AB, U+20AD-20C0, U+2113, U+2C60-2C7F, U+A720-A7FF;\n}\n/* latin */\n@font-face {\n  font-family: 'Nunito';\n  font-style: normal;\n  font-weight: 900;\n  font-display: swap;\n  src: url(\"349d03fc-54c6-4527-8ec6-82ec0d67a1e7\") format('woff2');\n  unicode-range: U+0000-00FF, U+0131, U+0152-0153, U+02BB-02BC, U+02C6, U+02DA, U+02DC, U+0304, U+0308, U+0329, U+2000-206F, U+20AC, U+2122, U+2191, U+2193, U+2212, U+2215, U+FEFF, U+FFFD;\n}\n\n\n/* ════════════════════════════════════════════════════════════════════════\n   COLORS — Sistema de Estudos\n   Calm, study-friendly green system. Sage-tinted neutrals keep long study\n   sessions easy on the eyes; two track accents separate the user's two\n   parallel study tracks (IA / Concursos).\n   ════════════════════════════════════════════════════════════════════════ */\n\n:root {\n  /* ── Brand green (primary) ─────────────────────────────────────────── */\n  --green-50:  #ecfdf3;\n  --green-100: #d3f8e0;\n  --green-200: #a9efc6;\n  --green-300: #72e2a6;\n  --green-400: #38cc83;\n  --green-500: #16b364;   /* brand */\n  --green-600: #099250;   /* primary action */\n  --green-700: #087443;\n  --green-800: #075a36;\n  --green-900: #06492d;\n  --green-950: #042c1c;\n\n  /* ── Teal (secondary / IA track) ──────────────────────────────────── */\n  --teal-50:  #effdf9;\n  --teal-100: #cdf6ec;\n  --teal-200: #9aecda;\n  --teal-300: #5dd9c3;\n  --teal-400: #2fbfa9;\n  --teal-500: #14a392;\n  --teal-600: #0d8377;\n  --teal-700: #106960;\n  --teal-800: #11544d;\n  --teal-900: #114641;\n\n  /* ── Sage neutrals (green-tinted gray) ────────────────────────────── */\n  --n-0:   #ffffff;\n  --n-50:  #f6f8f6;\n  --n-100: #eef1ee;\n  --n-200: #e2e7e2;\n  --n-300: #cfd6d0;\n  --n-400: #a6afa8;\n  --n-500: #79827b;\n  --n-600: #58615a;\n  --n-700: #414944;\n  --n-800: #2a302c;\n  --n-900: #1a1f1c;\n  --n-950: #0f1311;\n\n  /* ── Semantic hues ────────────────────────────────────────────────── */\n  --amber-50:  #fff8eb;\n  --amber-100: #fdedc8;\n  --amber-400: #f5b13d;\n  --amber-500: #ef9d11;\n  --amber-600: #cc7a06;\n  --amber-700: #a35c0a;\n\n  --rose-50:  #fff0f1;\n  --rose-100: #ffdde0;\n  --rose-400: #fb6f7e;\n  --rose-500: #ef4458;\n  --rose-600: #d61f3c;\n  --rose-700: #b01530;\n\n  --sky-50:  #eef6ff;\n  --sky-100: #d7eaff;\n  --sky-400: #51a3f5;\n  --sky-500: #2a82e6;\n  --sky-600: #1866c7;\n  --sky-700: #16529e;\n\n  /* ════════════════════════════════════════════════════════════════════\n     SEMANTIC ALIASES — reference these in components, not the raw scale.\n     ════════════════════════════════════════════════════════════════════ */\n\n  /* Brand */\n  --brand:            var(--green-600);\n  --brand-strong:     var(--green-700);\n  --brand-soft:       var(--green-100);\n  --brand-subtle:     var(--green-50);\n  --brand-contrast:   var(--n-0);\n\n  /* Surfaces */\n  --surface-page:     var(--n-50);\n  --surface-card:     var(--n-0);\n  --surface-sunken:   var(--n-100);\n  --surface-raised:   var(--n-0);\n  --surface-inverse:  var(--green-950);\n  --surface-overlay:  rgba(15, 19, 17, 0.46);\n\n  /* Text */\n  --text-strong:      var(--n-900);\n  --text-body:        var(--n-700);\n  --text-muted:       var(--n-500);\n  --text-faint:       var(--n-400);\n  --text-on-brand:    var(--n-0);\n  --text-inverse:     var(--n-50);\n  --text-link:        var(--green-700);\n\n  /* Borders */\n  --border-subtle:    var(--n-200);\n  --border-default:   var(--n-300);\n  --border-strong:    var(--n-400);\n  --border-brand:     var(--green-300);\n  --ring-brand:       rgba(9, 146, 80, 0.30);\n\n  /* Feedback */\n  --success:          var(--green-600);\n  --success-soft:     var(--green-50);\n  --warning:          var(--amber-600);\n  --warning-soft:     var(--amber-50);\n  --danger:           var(--rose-600);\n  --danger-soft:      var(--rose-50);\n  --info:             var(--sky-600);\n  --info-soft:        var(--sky-50);\n\n  /* Study-track accents — the platform runs two parallel tracks */\n  --track-ia:         var(--teal-600);   /* AI / Claude courses */\n  --track-ia-soft:    var(--teal-50);\n  --track-concurso:   var(--green-600);  /* Estratégia / SC concursos */\n  --track-concurso-soft: var(--green-50);\n\n  /* Progress / data viz (calm, sequential) */\n  --data-1: var(--green-500);\n  --data-2: var(--teal-500);\n  --data-3: var(--sky-500);\n  --data-4: var(--amber-500);\n  --data-5: var(--n-400);\n}\n\n/* ════════════════════════════════════════════════════════════════════════\n   TYPOGRAPHY — Nunito (rounded, friendly) for everything UI + display,\n   JetBrains Mono for numbers, timers, code and AI snippets.\n   ════════════════════════════════════════════════════════════════════════ */\n\n:root {\n  /* ── Families ─────────────────────────────────────────────────────── */\n  --font-sans: 'Nunito', ui-rounded, 'Segoe UI', system-ui, -apple-system, sans-serif;\n  --font-display: 'Nunito', ui-rounded, system-ui, sans-serif;\n  --font-mono: 'JetBrains Mono', ui-monospace, 'SFMono-Regular', Menlo, monospace;\n\n  /* ── Weights ──────────────────────────────────────────── @kind font */\n  --fw-regular: 400;    /* @kind font */\n  --fw-medium:  500;    /* @kind font */\n  --fw-semibold: 600;   /* @kind font */\n  --fw-bold:    700;    /* @kind font */\n  --fw-extrabold: 800;  /* @kind font */\n  --fw-black:   900;    /* @kind font */\n\n  /* ── Type scale (1.20 minor-third-ish, tuned) ─────────────────────── */\n  --fs-2xs: 0.6875rem;  /* 11px — labels, fine print */\n  --fs-xs:  0.75rem;    /* 12px */\n  --fs-sm:  0.8125rem;  /* 13px */\n  --fs-base:0.9375rem;  /* 15px — body default */\n  --fs-md:  1rem;       /* 16px */\n  --fs-lg:  1.125rem;   /* 18px */\n  --fs-xl:  1.375rem;   /* 22px */\n  --fs-2xl: 1.75rem;    /* 28px */\n  --fs-3xl: 2.25rem;    /* 36px */\n  --fs-4xl: 2.875rem;   /* 46px */\n  --fs-5xl: 3.5rem;     /* 56px */\n\n  /* ── Line heights ─────────────────────────────────────────────────── */\n  --lh-tight:   1.15;   /* @kind font */\n  --lh-snug:    1.3;    /* @kind font */\n  --lh-normal:  1.5;    /* @kind font */\n  --lh-relaxed: 1.65;   /* @kind font */\n\n  /* ── Letter spacing ───────────────────────────────────────────────── */\n  --ls-tight:  -0.02em;  /* @kind font */\n  --ls-snug:   -0.01em;  /* @kind font */\n  --ls-normal: 0;        /* @kind font */\n  --ls-wide:   0.02em;   /* @kind font */\n  --ls-caps:   0.06em;   /* @kind font */\n\n  /* ════════════════════════════════════════════════════════════════════\n     SEMANTIC ROLES\n     ════════════════════════════════════════════════════════════════════ */\n  --text-display:  var(--fw-extrabold) var(--fs-4xl)/var(--lh-tight) var(--font-display);\n  --text-h1:       var(--fw-extrabold) var(--fs-3xl)/var(--lh-tight) var(--font-display);\n  --text-h2:       var(--fw-bold) var(--fs-2xl)/var(--lh-snug) var(--font-display);\n  --text-h3:       var(--fw-bold) var(--fs-xl)/var(--lh-snug) var(--font-sans);\n  --text-title:    var(--fw-bold) var(--fs-lg)/var(--lh-snug) var(--font-sans);\n  --text-body-lg:  var(--fw-regular) var(--fs-md)/var(--lh-relaxed) var(--font-sans);\n  --text-body-md:  var(--fw-regular) var(--fs-base)/var(--lh-normal) var(--font-sans);\n  --text-body-sm:  var(--fw-regular) var(--fs-sm)/var(--lh-normal) var(--font-sans);\n  --text-label:    var(--fw-semibold) var(--fs-sm)/1.2 var(--font-sans);\n  --text-caption:  var(--fw-medium) var(--fs-xs)/1.3 var(--font-sans);\n  --text-mono:     var(--fw-medium) var(--fs-sm)/1.4 var(--font-mono);\n}\n\n/* ════════════════════════════════════════════════════════════════════════\n   SPACING & RADII — 4px base grid. Friendly rounded radii for a calm,\n   approachable study UI.\n   ════════════════════════════════════════════════════════════════════════ */\n\n:root {\n  /* ── Spacing scale (4px grid) ─────────────────────────────────────── */\n  --sp-0:  0;          /* @kind spacing */\n  --sp-1:  0.25rem;   /* 4 */\n  --sp-2:  0.5rem;    /* 8 */\n  --sp-3:  0.75rem;   /* 12 */\n  --sp-4:  1rem;      /* 16 */\n  --sp-5:  1.25rem;   /* 20 */\n  --sp-6:  1.5rem;    /* 24 */\n  --sp-7:  2rem;      /* 32 */\n  --sp-8:  2.5rem;    /* 40 */\n  --sp-9:  3rem;      /* 48 */\n  --sp-10: 4rem;      /* 64 */\n  --sp-11: 5rem;      /* 80 */\n  --sp-12: 6rem;      /* 96 */\n\n  /* ── Radii — generous & rounded (friendly) ────────────────────────── */\n  --radius-xs:  6px;\n  --radius-sm:  9px;\n  --radius-md:  12px;\n  --radius-lg:  16px;\n  --radius-xl:  20px;\n  --radius-2xl: 28px;\n  --radius-pill: 999px;\n  --radius-circle: 50%;\n\n  /* ── Common control sizing ────────────────────────────────────────── */\n  --control-h-sm: 32px;\n  --control-h-md: 40px;\n  --control-h-lg: 48px;\n\n  /* ── Layout ───────────────────────────────────────────────────────── */\n  --container-max: 1200px;\n  --sidebar-w: 264px;\n  --content-gutter: var(--sp-7);\n}\n\n/* ════════════════════════════════════════════════════════════════════════\n   ELEVATION — soft, low-contrast, slightly green-tinted shadows. The brand\n   stays calm: shadows are diffuse and gentle, never harsh drop-shadows.\n   ════════════════════════════════════════════════════════════════════════ */\n\n:root {\n  /* Shadow ink is a deep green, not pure black — keeps the palette cohesive */\n  --shadow-color: 150 30% 12%;\n\n  --shadow-xs: 0 1px 2px hsl(var(--shadow-color) / 0.06);\n  --shadow-sm: 0 1px 2px hsl(var(--shadow-color) / 0.05),\n               0 2px 6px hsl(var(--shadow-color) / 0.06);\n  --shadow-md: 0 2px 4px hsl(var(--shadow-color) / 0.05),\n               0 6px 16px hsl(var(--shadow-color) / 0.08);\n  --shadow-lg: 0 4px 8px hsl(var(--shadow-color) / 0.05),\n               0 12px 28px hsl(var(--shadow-color) / 0.10);\n  --shadow-xl: 0 8px 16px hsl(var(--shadow-color) / 0.06),\n               0 24px 48px hsl(var(--shadow-color) / 0.14);\n\n  /* Focus ring */\n  --shadow-focus: 0 0 0 3px var(--ring-brand);\n\n  /* Inset for sunken inputs */\n  --shadow-inset: inset 0 1px 2px hsl(var(--shadow-color) / 0.06);\n\n  /* Brand glow for emphasised CTAs (used sparingly) */\n  --shadow-brand: 0 6px 18px hsl(152 88% 28% / 0.22);\n}\n\n/* ════════════════════════════════════════════════════════════════════════\n   MOTION — calm and unobtrusive. Gentle ease-outs, no bounces or springs.\n   Motion supports focus; it never demands attention.\n   ════════════════════════════════════════════════════════════════════════ */\n\n:root {\n  /* Durations */\n  --dur-fast:   120ms;  /* @kind other */\n  --dur-base:   180ms;  /* @kind other */\n  --dur-slow:   260ms;  /* @kind other */\n  --dur-slower: 400ms;  /* @kind other */\n\n  /* Easing — soft, calm. No overshoot. */\n  --ease-out:    cubic-bezier(0.22, 0.61, 0.36, 1);  /* @kind other */\n  --ease-in-out: cubic-bezier(0.45, 0, 0.4, 1);      /* @kind other */\n  --ease-standard: cubic-bezier(0.4, 0, 0.2, 1);     /* @kind other */\n\n  /* Composed transitions */\n  --transition-colors: color var(--dur-fast) var(--ease-out),\n                       background-color var(--dur-fast) var(--ease-out),\n                       border-color var(--dur-fast) var(--ease-out);\n  --transition-transform: transform var(--dur-base) var(--ease-out);\n  --transition-base: all var(--dur-base) var(--ease-out);\n}\n\n@media (prefers-reduced-motion: reduce) {\n  :root {\n    --dur-fast: 0ms;    /* @kind other */\n    --dur-base: 0ms;    /* @kind other */\n    --dur-slow: 0ms;    /* @kind other */\n    --dur-slower: 0ms;  /* @kind other */\n  }\n}\n\n/* ════════════════════════════════════════════════════════════════════════\n   BASE — light reset + element defaults so cards, kits and prototypes share\n   a consistent baseline. Scoped to be unobtrusive.\n   ════════════════════════════════════════════════════════════════════════ */\n\n*, *::before, *::after { box-sizing: border-box; }\n\nhtml { -webkit-text-size-adjust: 100%; }\n\nbody {\n  margin: 0;\n  font: var(--text-body-md);\n  color: var(--text-body);\n  background: var(--surface-page);\n  -webkit-font-smoothing: antialiased;\n  text-rendering: optimizeLegibility;\n}\n\nh1, h2, h3, h4, h5, h6 { margin: 0; color: var(--text-strong); }\np { margin: 0; }\n\na { color: var(--text-link); text-decoration: none; }\na:hover { text-decoration: underline; }\n\nbutton { font-family: inherit; }\n\n::selection { background: var(--green-200); color: var(--green-900); }\n\ncode, kbd, samp { font-family: var(--font-mono); }\n\n/* Calm, brand-tinted scrollbars */\n* { scrollbar-color: var(--n-300) transparent; }\n*::-webkit-scrollbar { width: 10px; height: 10px; }\n*::-webkit-scrollbar-thumb {\n  background: var(--n-300);\n  border-radius: var(--radius-pill);\n  border: 2px solid transparent;\n  background-clip: padding-box;\n}\n*::-webkit-scrollbar-thumb:hover { background: var(--n-400); }\n\n/* ── Tiny utility set (optional helpers for cards / prototypes) ─────── */\n.se-eyebrow {\n  font: var(--text-label);\n  text-transform: uppercase;\n  letter-spacing: var(--ls-caps);\n  color: var(--brand-strong);\n}\n.se-mono { font: var(--text-mono); }\n.se-card-surface {\n  background: var(--surface-card);\n  border: 1px solid var(--border-subtle);\n  border-radius: var(--radius-lg);\n  box-shadow: var(--shadow-sm);\n}\n\n<\u002Fstyle>\n<script src=\"5a064fec-dacd-4702-a743-9e8e97b666a4\"><\u002Fscript>\n<script src=\"bdd44da3-4dc5-4d22-92ea-f264571829c9\"><\u002Fscript>\n<style>\n  body { margin: 0; background: var(--surface-page); color: var(--text-body); }\n  .layout { display: flex; min-height: 100vh; }\n  .main { flex: 1; min-width: 0; height: 100vh; overflow-y: auto; }\n  .page { max-width: 980px; margin: 0 auto; padding: var(--sp-8) var(--sp-7) var(--sp-12); }\n\n  /* Sidebar */\n  .sidebar { width: var(--sidebar-w); flex-shrink: 0; background: var(--surface-card); border-right: 1px solid var(--border-subtle); height: 100vh; position: sticky; top: 0; display: flex; flex-direction: column; padding: var(--sp-5) var(--sp-4); box-sizing: border-box; }\n  .sb-brand { display: flex; align-items: center; gap: 10px; padding: 0 var(--sp-2) var(--sp-6); }\n  .sb-brand .nm { font: var(--fw-extrabold) var(--fs-base)/1.15 var(--font-display); color: var(--text-strong); }\n  .sb-brand .tg { font: var(--fw-bold) 9px/1.4 var(--font-sans); letter-spacing: var(--ls-caps); color: var(--brand); }\n  .sb-nav { display: flex; flex-direction: column; gap: 2px; }\n  .sb-item { display: flex; align-items: center; gap: 11px; padding: 10px 12px; border: none; border-radius: var(--radius-md); cursor: pointer; text-align: left; font: var(--fw-semibold) var(--fs-base)/1 var(--font-sans); background: transparent; color: var(--text-body); transition: var(--transition-colors); width: 100%; }\n  .sb-item:hover { background: var(--surface-sunken); }\n  .sb-item.active { background: var(--brand-soft); color: var(--brand-strong); font-weight: var(--fw-bold); }\n  .sb-item i { width: 18px; height: 18px; }\n  .sb-item .soon { margin-left: auto; font: var(--fw-bold) 9px/1 var(--font-sans); text-transform: uppercase; letter-spacing: var(--ls-wide); color: var(--text-faint); background: var(--surface-sunken); padding: 3px 6px; border-radius: var(--radius-pill); }\n  .sb-foot { margin-top: auto; display: flex; flex-direction: column; gap: var(--sp-3); }\n  .sb-ia { padding: var(--sp-4); border-radius: var(--radius-lg); background: var(--track-ia-soft); border: 1px solid var(--teal-100); }\n  .sb-ia .t { display: flex; align-items: center; gap: 8px; margin-bottom: 6px; font: var(--fw-bold) var(--fs-sm)/1 var(--font-sans); color: var(--teal-800); }\n  .sb-ia .t i { width: 16px; height: 16px; color: var(--track-ia); }\n  .sb-ia p { font: var(--text-body-sm); color: var(--teal-700); margin: 0; }\n  .sb-user { display: flex; align-items: center; gap: 10px; padding: 0 var(--sp-2); }\n  .sb-user .av { width: 34px; height: 34px; border-radius: 50%; background: var(--brand-soft); color: var(--brand-strong); display: flex; align-items: center; justify-content: center; font: var(--fw-bold) 14px/1 var(--font-sans); flex-shrink: 0; }\n  .sb-user .nm { font: var(--fw-bold) var(--fs-sm)/1.1 var(--font-sans); color: var(--text-strong); }\n  .sb-user .su { font: var(--text-caption); color: var(--text-muted); }\n  .placeholder { padding: var(--sp-12) var(--sp-7); text-align: center; color: var(--text-muted); }\n  .placeholder i { width: 44px; height: 44px; color: var(--n-300); }\n  .placeholder h2 { font: var(--text-h2); color: var(--text-strong); margin: var(--sp-4) 0 var(--sp-2); }\n  @media (max-width: 860px) { .sidebar { display: none; } .main { height: auto; overflow: visible; } body { display: block; } }\n\n  /* Banner */\n  .banner {\n    background: linear-gradient(135deg, var(--green-700), var(--green-900));\n    border-radius: var(--radius-2xl); padding: var(--sp-8); color: #fff;\n    position: relative; overflow: hidden; box-shadow: var(--shadow-lg);\n  }\n  .banner::after {\n    content: ''; position: absolute; right: -60px; top: -60px; width: 240px; height: 240px;\n    background: radial-gradient(circle, rgba(255,255,255,0.10), transparent 70%);\n  }\n  .banner .eyebrow { font: var(--fw-bold) var(--fs-xs)/1 var(--font-sans); text-transform: uppercase; letter-spacing: var(--ls-caps); color: var(--green-200); }\n  .banner h1 { font: var(--text-display); letter-spacing: var(--ls-tight); margin: 10px 0 4px; color: #fff; }\n  .banner .sub { font: var(--text-body-lg); color: var(--green-100); }\n  .meta-row { display: flex; flex-wrap: wrap; gap: var(--sp-5); margin-top: var(--sp-6); }\n  .meta { display: flex; flex-direction: column; gap: 2px; }\n  .meta .k { font: var(--fw-bold) 10px/1 var(--font-sans); text-transform: uppercase; letter-spacing: var(--ls-caps); color: var(--green-300); }\n  .meta .v { font: var(--fw-bold) var(--fs-base)/1.2 var(--font-sans); color: #fff; }\n  .brandmark { display: flex; align-items: center; gap: 10px; margin-bottom: var(--sp-5); }\n  .brandmark .nm { font: var(--fw-extrabold) var(--fs-base)/1 var(--font-display); }\n  .brandmark .tg { font: var(--fw-bold) 9px/1.3 var(--font-sans); letter-spacing: var(--ls-caps); color: var(--green-300); }\n\n  /* Section heads */\n  .sec { margin-top: var(--sp-9); }\n  .sec-head { display: flex; align-items: center; gap: 10px; margin-bottom: var(--sp-2); }\n  .sec-head .ico { width: 34px; height: 34px; border-radius: var(--radius-md); background: var(--brand-soft); color: var(--brand-strong); display: flex; align-items: center; justify-content: center; flex-shrink: 0; }\n  .sec-head h2 { font: var(--text-h2); color: var(--text-strong); letter-spacing: var(--ls-snug); }\n  .sec-desc { font: var(--text-body-md); color: var(--text-muted); margin-bottom: var(--sp-5); max-width: 70ch; }\n\n  /* Mentor card */\n  .mentor { background: var(--surface-card); border: 1px solid var(--border-subtle); border-left: 4px solid var(--brand); border-radius: var(--radius-lg); padding: var(--sp-6); box-shadow: var(--shadow-sm); }\n  .mentor h3 { font: var(--text-title); color: var(--text-strong); margin-bottom: var(--sp-4); display: flex; align-items: center; gap: 8px; }\n  .mentor ul { margin: 0; padding: 0; list-style: none; display: flex; flex-direction: column; gap: var(--sp-3); }\n  .mentor li { display: flex; gap: 11px; font: var(--text-body-md); color: var(--text-body); line-height: var(--lh-normal); }\n  .mentor li b { color: var(--text-strong); }\n  .mentor li .dot { width: 7px; height: 7px; border-radius: 50%; background: var(--brand); margin-top: 8px; flex-shrink: 0; }\n\n  /* Materia grid */\n  .mat-grid { display: grid; grid-template-columns: 1fr; gap: var(--sp-4); }\n  .mat { background: var(--surface-card); border: 1px solid var(--border-subtle); border-radius: var(--radius-lg); padding: var(--sp-5); box-shadow: var(--shadow-xs); }\n  .mat-top { display: flex; align-items: center; gap: var(--sp-3); margin-bottom: var(--sp-3); }\n  .mat-bar { width: 5px; align-self: stretch; border-radius: var(--radius-pill); flex-shrink: 0; }\n  .mat-name { font: var(--fw-bold) var(--fs-lg)/1.2 var(--font-sans); color: var(--text-strong); flex: 1; }\n  .mat-hours { font: var(--text-mono); font-size: var(--fs-sm); color: var(--text-muted); white-space: nowrap; }\n  .chips { display: flex; flex-wrap: wrap; gap: 6px; }\n  .chip { font: var(--fw-semibold) var(--fs-xs)/1 var(--font-sans); color: var(--text-body); background: var(--surface-sunken); border-radius: var(--radius-pill); padding: 5px 10px; }\n  .pill { font: var(--fw-bold) 10px/1 var(--font-sans); text-transform: uppercase; letter-spacing: var(--ls-wide); padding: 4px 9px; border-radius: var(--radius-pill); white-space: nowrap; }\n  .pill.leg { background: var(--amber-50); color: var(--amber-700); }\n  .pill.p3 { background: var(--rose-50); color: var(--rose-700); }\n  .pill.p2 { background: var(--brand-soft); color: var(--brand-strong); }\n  .pill.p1 { background: var(--n-100); color: var(--n-600); }\n  .pill.syn { background: var(--teal-50); color: var(--teal-700); }\n  .area-label { font: var(--fw-extrabold) var(--fs-xs)/1 var(--font-sans); text-transform: uppercase; letter-spacing: var(--ls-caps); color: var(--text-faint); margin: var(--sp-6) 0 var(--sp-3); }\n\n  /* Ciclo grid */\n  .ciclo { background: var(--surface-card); border: 1px solid var(--border-subtle); border-radius: var(--radius-lg); overflow: hidden; box-shadow: var(--shadow-sm); }\n  .ciclo-grid { display: grid; grid-template-columns: repeat(6, 1fr); }\n  .ciclo-col { border-left: 1px solid var(--border-subtle); }\n  .ciclo-col:first-child { border-left: none; }\n  .ciclo-day { padding: var(--sp-3); text-align: center; font: var(--fw-extrabold) var(--fs-sm)/1 var(--font-sans); color: var(--text-strong); background: var(--surface-sunken); border-bottom: 1px solid var(--border-subtle); }\n  .ciclo-body { padding: 8px; display: flex; flex-direction: column; gap: 8px; min-height: 150px; }\n  .blk { border-radius: var(--radius-sm); padding: 9px 10px; background: var(--n-50); border-left: 3px solid var(--brand); cursor: pointer; transition: var(--transition-base); position: relative; user-select: none; }\n  .blk:hover { box-shadow: var(--shadow-sm); }\n  .blk .bt { font: var(--fw-bold) var(--fs-xs)/1.2 var(--font-sans); color: var(--text-strong); padding-right: 20px; }\n  .blk .bh { font: var(--text-mono); font-size: 10px; color: var(--text-muted); margin-top: 3px; }\n  .blk .bf { font: var(--fw-medium) 10px/1.3 var(--font-sans); color: var(--text-muted); margin-top: 4px; }\n  .blk .bcheck { position: absolute; top: 8px; right: 8px; width: 17px; height: 17px; border-radius: 50%; border: 1.5px solid var(--border-strong); background: var(--surface-card); display: flex; align-items: center; justify-content: center; transition: var(--transition-base); }\n  .blk.done { background: var(--brand-soft) !important; }\n  .blk.done .bt { color: var(--brand-strong); text-decoration: line-through; text-decoration-color: var(--green-300); }\n  .blk.done .bcheck { background: var(--brand); border-color: var(--brand); }\n  .blk.done .bcheck svg { display: block; }\n  .blk .bcheck svg { display: none; }\n\n  /* Week label + use bar + progress */\n  .week-label { font: var(--fw-extrabold) var(--fs-sm)/1 var(--font-sans); color: var(--text-strong); display: flex; align-items: center; gap: 8px; margin: var(--sp-5) 0 var(--sp-3); }\n  .week-label::before { content: ''; width: 8px; height: 8px; border-radius: 50%; background: var(--brand); }\n  .week-label:first-child { margin-top: 0; }\n  .usebar { display: flex; align-items: center; gap: var(--sp-4); flex-wrap: wrap; background: var(--track-ia-soft); border: 1px solid var(--teal-100); border-radius: var(--radius-md); padding: var(--sp-3) var(--sp-4); margin-bottom: var(--sp-4); }\n  .useinfo { display: flex; align-items: center; gap: 8px; font: var(--text-body-sm); color: var(--teal-800); flex: 1; }\n  .useinfo i { width: 16px; height: 16px; color: var(--track-ia); flex-shrink: 0; }\n  .reset { display: inline-flex; align-items: center; gap: 6px; background: var(--surface-card); border: 1px solid var(--border-default); border-radius: var(--radius-sm); padding: 7px 12px; font: var(--fw-bold) var(--fs-xs)/1 var(--font-sans); color: var(--text-body); cursor: pointer; transition: var(--transition-base); }\n  .reset:hover { background: var(--surface-sunken); }\n  .prog-wrap { display: flex; align-items: center; gap: var(--sp-4); margin-bottom: var(--sp-5); }\n  .prog-track { flex: 1; height: 10px; background: var(--surface-sunken); border-radius: var(--radius-pill); overflow: hidden; }\n  .prog-fill { height: 100%; width: 0; background: var(--brand); border-radius: var(--radius-pill); transition: width var(--dur-slow) var(--ease-out); }\n  .prog-label { font: var(--text-mono); font-size: var(--fs-sm); color: var(--text-body); white-space: nowrap; }\n\n  /* Legislacao */\n  .leg-list { display: grid; grid-template-columns: 1fr 1fr; gap: var(--sp-3); }\n  .leg-item { display: flex; align-items: center; gap: var(--sp-3); background: var(--surface-card); border: 1px solid var(--border-subtle); border-radius: var(--radius-md); padding: var(--sp-3) var(--sp-4); box-shadow: var(--shadow-xs); }\n  .leg-item i { color: var(--amber-600); width: 18px; height: 18px; flex-shrink: 0; }\n  .leg-item .lt { flex: 1; }\n  .leg-item .ll { font: var(--fw-bold) var(--fs-sm)/1.2 var(--font-mono); color: var(--text-strong); }\n  .leg-item .lm { font: var(--text-caption); color: var(--text-muted); }\n\n  /* Method legend + cycle summary */\n  .summary-row { display: flex; gap: var(--sp-4); margin-top: var(--sp-5); flex-wrap: wrap; }\n  .sumcard { flex: 1; min-width: 150px; background: var(--surface-card); border: 1px solid var(--border-subtle); border-radius: var(--radius-lg); padding: var(--sp-5); box-shadow: var(--shadow-xs); }\n  .sumcard .sk { font: var(--fw-bold) 10px/1 var(--font-sans); text-transform: uppercase; letter-spacing: var(--ls-caps); color: var(--text-faint); }\n  .sumcard .sv { font: var(--fw-extrabold) var(--fs-2xl)/1 var(--font-display); color: var(--text-strong); margin-top: 8px; }\n  .sumcard .su { font: var(--fw-bold) var(--fs-sm)/1 var(--font-sans); color: var(--text-muted); }\n\n  .disclaimer { margin-top: var(--sp-8); padding: var(--sp-4) var(--sp-5); background: var(--info-soft); border: 1px solid var(--sky-100); border-radius: var(--radius-md); font: var(--text-body-sm); color: var(--sky-700); display: flex; gap: 10px; }\n  .disclaimer i { width: 18px; height: 18px; flex-shrink: 0; margin-top: 1px; }\n\n  .cta { display: inline-flex; align-items: center; gap: 8px; margin-top: var(--sp-5); padding: 0 var(--sp-6); height: var(--control-h-lg); background: var(--brand); color: #fff; border: none; border-radius: var(--radius-md); font: var(--fw-bold) var(--fs-md)/1 var(--font-sans); cursor: pointer; box-shadow: var(--shadow-brand); transition: var(--transition-base); }\n  .cta:hover { background: var(--brand-strong); }\n  @media (max-width: 720px) { .ciclo-grid { grid-template-columns: repeat(3, 1fr); } .leg-list { grid-template-columns: 1fr; } }\n<\u002Fstyle>\n<\u002Fhead>\n<body>\n\n<div class=\"layout\">\n\n  <!-- Sidebar -->\n  <aside class=\"sidebar\">\n    <div class=\"sb-brand\">\n      <svg width=\"34\" height=\"34\" viewBox=\"0 0 64 64\" fill=\"none\" style=\"flex-shrink:0\">\n        <rect width=\"64\" height=\"64\" rx=\"16\" fill=\"#099250\"><\u002Frect>\n        <path d=\"M16 33.5 L27 44 L44.5 21\" stroke=\"#fff\" stroke-width=\"6.5\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><\u002Fpath>\n        <path d=\"M44.5 21 C44.5 21 50.5 18.5 50.5 24.5 C50.5 30 44.5 29.5 44.5 29.5 C44.5 29.5 43.4 24 44.5 21 Z\" fill=\"#a9efc6\"><\u002Fpath>\n      <\u002Fsvg>\n      <div><div class=\"nm\">Sistema de Estudos<\u002Fdiv><div class=\"tg\">CONCURSO SC<\u002Fdiv><\u002Fdiv>\n    <\u002Fdiv>\n    <nav class=\"sb-nav\" id=\"sb-nav\"><\u002Fnav>\n    <div class=\"sb-foot\">\n      <div class=\"sb-ia\">\n        <div class=\"t\"><i data-lucide=\"sparkles\"><\u002Fi> Trilha IA<\u002Fdiv>\n        <p>Curso Claude · 2 de 5 módulos<\u002Fp>\n      <\u002Fdiv>\n      <div class=\"sb-user\">\n        <span class=\"av\">L<\u002Fspan>\n        <div><div class=\"nm\">Meu plano<\u002Fdiv><div class=\"su\">Administrador · 2026<\u002Fdiv><\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Faside>\n\n  <!-- Main scroll area -->\n  <div class=\"main\" id=\"main-scroll\">\n  <div class=\"page\" id=\"view-plano\">\n\n  <!-- Banner -->\n  <div class=\"banner\" data-screen-label=\"Plano — cabeçalho\">\n    <div class=\"brandmark\">\n      <img src=\"ee1a34d3-13f6-4f69-b90b-f1775794d48f\" width=\"30\" height=\"30\" alt=\"\">\n      <div><div class=\"nm\">Sistema de Estudos<\u002Fdiv><div class=\"tg\">PLANO GERADO A PARTIR DO EDITAL<\u002Fdiv><\u002Fdiv>\n    <\u002Fdiv>\n    <div class=\"eyebrow\">Conhecimentos Gerais + Específicos · Revisão por questões<\u002Fdiv>\n    <h1 id=\"b-cargo\">Administrador<\u002Fh1>\n    <div class=\"sub\" id=\"b-orgao\">Quadro Civil · SED/SC<\u002Fdiv>\n    <div class=\"meta-row\" id=\"b-meta\"><\u002Fdiv>\n  <\u002Fdiv>\n\n  <!-- Mentor -->\n  <div class=\"sec\" id=\"sec-inicio\">\n    <div class=\"sec-head\">\n      <span class=\"ico\"><i data-lucide=\"compass\"><\u002Fi><\u002Fspan>\n      <h2>Leitura do mentor<\u002Fh2>\n    <\u002Fdiv>\n    <p class=\"sec-desc\">Estratégia ajustada ao seu perfil — formação em Administração Pública e Pós em Projetos. Você parte na frente na teoria de gestão; o jogo se decide na <b>legislação<\u002Fb> e no <b>volume de questões<\u002Fb>.<\u002Fp>\n    <div class=\"mentor\">\n      <h3><i data-lucide=\"target\" style=\"width:18px;height:18px;color:var(--brand)\"><\u002Fi> Onde colocar energia<\u002Fh3>\n      <ul id=\"mentor-list\"><\u002Ful>\n    <\u002Fdiv>\n  <\u002Fdiv>\n\n  <!-- Materias -->\n  <div class=\"sec\" id=\"sec-materias\">\n    <div class=\"sec-head\">\n      <span class=\"ico\"><i data-lucide=\"library\"><\u002Fi><\u002Fspan>\n      <h2>Matérias do edital<\u002Fh2>\n    <\u002Fdiv>\n    <p class=\"sec-desc\">Conteúdo Programático extraído do <b>Anexo IV<\u002Fb> do edital, para o cargo de Administrador. Prioridade e carga semanal já calibradas ao seu perfil.<\u002Fp>\n    <div class=\"area-label\">Conhecimentos Específicos<\u002Fdiv>\n    <div class=\"mat-grid\" id=\"mat-especificos\"><\u002Fdiv>\n    <div class=\"area-label\">Conhecimentos Gerais<\u002Fdiv>\n    <div class=\"mat-grid\" id=\"mat-gerais\"><\u002Fdiv>\n  <\u002Fdiv>\n\n  <!-- Ciclo -->\n  <div class=\"sec\" id=\"sec-cronograma\">\n    <div class=\"sec-head\">\n      <span class=\"ico\"><i data-lucide=\"calendar-days\"><\u002Fi><\u002Fspan>\n      <h2>Ciclo de estudos · 2 h/dia<\u002Fh2>\n    <\u002Fdiv>\n    <p class=\"sec-desc\"><b>2 horas por dia, Seg a Sáb<\u002Fb> (12 h/semana). O ciclo roda em <b>duas semanas (A e B)<\u002Fb> para cobrir todas as matérias — Lei 14.133 e simulado se repetem nas duas. Cada bloco roda <b>~60% questões / 40% teoria<\u002Fb>. <b>Vá clicando nos blocos conforme conclui<\u002Fb> — fica salvo neste navegador.<\u002Fp>\n    <div class=\"usebar\">\n      <div class=\"useinfo\"><i data-lucide=\"bookmark\"><\u002Fi> <span>Favorite esta página e volte todo dia. Seu progresso é salvo automaticamente aqui.<\u002Fspan><\u002Fdiv>\n      <button class=\"reset\" onclick=\"resetProgress()\"><i data-lucide=\"rotate-ccw\" style=\"width:14px;height:14px\"><\u002Fi> Reiniciar ciclo<\u002Fbutton>\n    <\u002Fdiv>\n    <div class=\"prog-wrap\"><div class=\"prog-track\"><div class=\"prog-fill\" id=\"prog-fill\"><\u002Fdiv><\u002Fdiv><span class=\"prog-label\" id=\"prog-label\">0 de 0 blocos<\u002Fspan><\u002Fdiv>\n    <div id=\"ciclo-weeks\"><\u002Fdiv>\n    <div class=\"summary-row\" id=\"ciclo-summary\"><\u002Fdiv>\n  <\u002Fdiv>\n\n  <!-- Legislacao -->\n  <div class=\"sec\" id=\"sec-legislacao\">\n    <div class=\"sec-head\">\n      <span class=\"ico\" style=\"background:var(--amber-50);color:var(--amber-700)\"><i data-lucide=\"scale\"><\u002Fi><\u002Fspan>\n      <h2>Prioridade: atualização legislativa<\u002Fh2>\n    <\u002Fdiv>\n    <p class=\"sec-desc\">Monte um vade-mécum com estas normas e revise a <b>lei seca<\u002Fb> toda semana. São as que mais derrubam candidato por desatualização.<\u002Fp>\n    <div class=\"leg-list\" id=\"leg-list\"><\u002Fdiv>\n  <\u002Fdiv>\n\n  <div class=\"disclaimer\">\n    <i data-lucide=\"info\"><\u002Fi>\n    <span>Conteúdo extraído do <b>Edital n.º 794/SED/2026<\u002Fb> (banca FURB, Secretaria de Estado da Educação de SC). Os <b>Conhecimentos Gerais<\u002Fb> deste edital são voltados à legislação e gestão educacional — não incluem Língua Portuguesa nem Raciocínio Lógico isolados. Para outra secretaria/banca, reimporte o edital correspondente para recalibrar matérias e ciclo.<\u002Fspan>\n  <\u002Fdiv>\n\n  <button class=\"cta\" onclick=\"alert('No produto final, este botão lançaria o ciclo no seu Cronograma com datas e lembretes.')\">\n    <i data-lucide=\"rocket\" style=\"width:18px;height:18px\"><\u002Fi> Lançar ciclo no meu Cronograma\n  <\u002Fbutton>\n\n  <\u002Fdiv><!-- /view-plano -->\n\n  <!-- Placeholder views -->\n  <div class=\"page placeholder\" id=\"view-questoes\" style=\"display:none\">\n    <i data-lucide=\"list-checks\"><\u002Fi>\n    <h2>Questões<\u002Fh2>\n    <p>Em breve: banco de questões por matéria, correção automática e caderno de erros digital. Por enquanto, resolva questões na sua plataforma e registre os acertos no caderno de erros.<\u002Fp>\n  <\u002Fdiv>\n  <div class=\"page placeholder\" id=\"view-desempenho\" style=\"display:none\">\n    <i data-lucide=\"trending-up\"><\u002Fi>\n    <h2>Desempenho<\u002Fh2>\n    <p>Em breve: gráficos de aproveitamento por matéria e evolução semanal. Seu progresso do ciclo já é salvo na aba <b>Cronograma<\u002Fb>.<\u002Fp>\n  <\u002Fdiv>\n\n  <\u002Fdiv><!-- /main -->\n<\u002Fdiv><!-- /layout -->\n\n<script>\n  const P = window.PLANO;\n\n  // Banner meta\n  document.getElementById('b-cargo').textContent = P.cargo;\n  document.getElementById('b-orgao').textContent = P.quadro + ' · ' + P.orgao;\n  const meta = [\n    ['Edital', P.edital], ['Banca', P.banca], ['Habilitação', P.habilitacao], ['Carga semanal', P.cargaSemanal],\n  ];\n  document.getElementById('b-meta').innerHTML = meta.map(([k,v]) =>\n    `<div class=\"meta\"><span class=\"k\">${k}<\u002Fspan><span class=\"v\">${v}<\u002Fspan><\u002Fdiv>`).join('');\n\n  // Mentor bullets\n  const mentor = [\n    ['Capitalize sua base.', 'Em <b>Administração Pública, gestão de processos, planejamento estratégico e gestão por resultados<\u002Fb> você já domina — não estude do zero, vá direto a questões para fixar a banca e a redação dos enunciados.'],\n    ['Sua Pós em Projetos é trunfo.', 'Mapeia direto em <b>planejamento estratégico no setor público, gestão de processos, riscos e indicadores<\u002Fb>. Use-a para acelerar esses tópicos.'],\n    ['Ataque a legislação nova.', '<b>Lei 14.133/2021<\u002Fb>, <b>LGPD<\u002Fb>, <b>LAI<\u002Fb> e <b>Regime Jurídico dos Servidores de SC (Lei 6.745/85)<\u002Fb> são o maior risco — lei seca + questões toda semana.'],\n    ['Cuidado com o conteúdo educacional.', 'Como é concurso da <b>Educação (SED)<\u002Fb>, os Conhecimentos Gerais cobram <b>LDB, LC 170/98, PNE/PEE-SC, BNCC e Currículo de SC<\u002Fb> — território fora do seu dia a dia. Dê atenção redobrada.'],\n    ['Sinergia com sua trilha de IA.', 'O tópico <b>\"IA na educação — aplicações éticas\"<\u002Fb> conversa com o curso da Claude que você já faz. Aproveite o embalo e feche esse ponto rápido.'],\n    ['Revisão por questões é a régua.', 'Meça progresso por <b>questões certas<\u002Fb>, não por horas. Mantenha um <b>caderno de erros<\u002Fb> e faça <b>simulado cronometrado<\u002Fb> todo sábado.'],\n  ];\n  document.getElementById('mentor-list').innerHTML = mentor.map(([b,t]) =>\n    `<li><span class=\"dot\"><\u002Fspan><span><b>${b}<\u002Fb> ${t}<\u002Fspan><\u002Fli>`).join('');\n\n  // Materia cards\n  function matCard(m) {\n    const pcls = m.peso === 3 ? 'p3' : m.peso === 2 ? 'p2' : 'p1';\n    const plabel = m.peso === 3 ? 'Alta prioridade' : m.peso === 2 ? 'Média' : 'Apoio';\n    const tags = [`<span class=\"pill ${pcls}\">${plabel}<\u002Fspan>`];\n    if (m.legislativo) tags.push('<span class=\"pill leg\">Legislação<\u002Fspan>');\n    if (m.sinergia) tags.push('<span class=\"pill syn\">Sinergia IA<\u002Fspan>');\n    return `<div class=\"mat\">\n      <div class=\"mat-top\">\n        <span class=\"mat-bar\" style=\"background:${m.cor}\"><\u002Fspan>\n        <span class=\"mat-name\">${m.nome}<\u002Fspan>\n      <\u002Fdiv>\n      <div class=\"chips\" style=\"margin-bottom:10px\">${m.topicos.map(t=>`<span class=\"chip\">${t}<\u002Fspan>`).join('')}<\u002Fdiv>\n      <div class=\"chips\">${tags.join('')}<\u002Fdiv>\n    <\u002Fdiv>`;\n  }\n  document.getElementById('mat-especificos').innerHTML = P.materias.especificos.map(matCard).join('');\n  document.getElementById('mat-gerais').innerHTML = P.materias.gerais.map(matCard).join('');\n\n  // ── Ciclo (duas semanas) com checklist persistente ──────────────────\n  const STORE_KEY = 'se_plano_admin_sc_v1';\n  let done = {};\n  try { done = JSON.parse(localStorage.getItem(STORE_KEY)) || {}; } catch (e) { done = {}; }\n  const saveDone = () => localStorage.setItem(STORE_KEY, JSON.stringify(done));\n\n  const check = `<span class=\"bcheck\"><svg width=\"11\" height=\"11\" viewBox=\"0 0 12 12\" fill=\"none\"><path d=\"M2.5 6.2L5 8.5L9.5 3.5\" stroke=\"#fff\" stroke-width=\"2\" stroke-linecap=\"round\" stroke-linejoin=\"round\"/><\u002Fsvg><\u002Fspan>`;\n  let totalBlocks = 0;\n\n  function renderWeeks() {\n    const weeksEl = document.getElementById('ciclo-weeks');\n    weeksEl.innerHTML = P.ciclo.semanas.map((sem, wi) => {\n      const cols = P.ciclo.dias.map(d => {\n        const blocos = (sem.blocos[d] || []).map((b, bi) => {\n          const id = `w${wi}-${d}-${bi}`;\n          const isDone = !!done[id];\n          return `<div class=\"blk ${isDone ? 'done' : ''}\" data-id=\"${id}\" style=\"border-left-color:${b.cor};background:${isDone ? '' : b.cor + '10'}\">\n            ${check}\n            <div class=\"bt\">${b.t}<\u002Fdiv><div class=\"bh\">${b.h}<\u002Fdiv><div class=\"bf\">${b.foco}<\u002Fdiv>\n          <\u002Fdiv>`;\n        }).join('');\n        return `<div class=\"ciclo-col\"><div class=\"ciclo-day\">${d}<\u002Fdiv><div class=\"ciclo-body\">${blocos}<\u002Fdiv><\u002Fdiv>`;\n      }).join('');\n      return `<div class=\"week-label\">${sem.nome} · 12 h<\u002Fdiv><div class=\"ciclo\"><div class=\"ciclo-grid\">${cols}<\u002Fdiv><\u002Fdiv>`;\n    }).join('');\n\n    totalBlocks = 0;\n    P.ciclo.semanas.forEach((sem) => P.ciclo.dias.forEach(d => (sem.blocos[d] || []).forEach(() => totalBlocks++)));\n\n    weeksEl.querySelectorAll('.blk').forEach(el => {\n      el.addEventListener('click', () => {\n        const id = el.dataset.id;\n        done[id] = !done[id];\n        saveDone();\n        el.classList.toggle('done', done[id]);\n        const bcolor = el.style.borderLeftColor;\n        el.style.background = done[id] ? '' : bcolor + '10';\n        updateProgress();\n      });\n    });\n    lucide.createIcons();\n    updateProgress();\n  }\n\n  function updateProgress() {\n    const n = Object.values(done).filter(Boolean).length;\n    const pct = totalBlocks ? Math.round((n / totalBlocks) * 100) : 0;\n    document.getElementById('prog-fill').style.width = pct + '%';\n    document.getElementById('prog-label').textContent = `${n} de ${totalBlocks} blocos · ${pct}%`;\n  }\n\n  window.resetProgress = function () {\n    if (!confirm('Reiniciar o ciclo? Todos os checks serão apagados.')) return;\n    done = {}; saveDone(); renderWeeks();\n  };\n\n  renderWeeks();\n\n  // Ciclo summary\n  const sums = [\n    ['Carga diária', '2', 'horas / dia'],\n    ['Carga semanal', '12', 'horas (Seg–Sáb)'],\n    ['Ciclo completo', '2', 'semanas (A + B)'],\n    ['Foco em questões', '~60%', 'de cada bloco'],\n  ];\n  document.getElementById('ciclo-summary').innerHTML = sums.map(([k,v,u]) =>\n    `<div class=\"sumcard\"><div class=\"sk\">${k}<\u002Fdiv><div class=\"sv\">${v}<\u002Fdiv><div class=\"su\">${u}<\u002Fdiv><\u002Fdiv>`).join('');\n\n  // Legislacao\n  document.getElementById('leg-list').innerHTML = P.legislacao.map(l =>\n    `<div class=\"leg-item\"><i data-lucide=\"${l.tag==='crítico'?'alert-triangle':'book-marked'}\"><\u002Fi>\n      <div class=\"lt\"><div class=\"ll\">${l.lei}<\u002Fdiv><div class=\"lm\">${l.tema}<\u002Fdiv><\u002Fdiv><\u002Fdiv>`).join('');\n\n  // ── Navegação lateral ───────────────────────────────────────────────\n  const NAV = [\n    { id: 'inicio', label: 'Início', icon: 'layout-dashboard', target: 'sec-inicio', view: 'plano' },\n    { id: 'cronograma', label: 'Cronograma', icon: 'calendar-days', target: 'sec-cronograma', view: 'plano' },\n    { id: 'materias', label: 'Matérias', icon: 'book-open', target: 'sec-materias', view: 'plano' },\n    { id: 'questoes', label: 'Questões', icon: 'list-checks', view: 'questoes', soon: true },\n    { id: 'desempenho', label: 'Desempenho', icon: 'trending-up', view: 'desempenho', soon: true },\n  ];\n  const navEl = document.getElementById('sb-nav');\n  navEl.innerHTML = NAV.map((n, i) =>\n    `<button class=\"sb-item ${i===0?'active':''}\" data-nav=\"${n.id}\">\n      <i data-lucide=\"${n.icon}\"><\u002Fi>${n.label}${n.soon?'<span class=\"soon\">em breve<\u002Fspan>':''}\n    <\u002Fbutton>`).join('');\n\n  const views = { plano: document.getElementById('view-plano'), questoes: document.getElementById('view-questoes'), desempenho: document.getElementById('view-desempenho') };\n  const mainScroll = document.getElementById('main-scroll');\n\n  function go(n) {\n    navEl.querySelectorAll('.sb-item').forEach(b => b.classList.toggle('active', b.dataset.nav === n.id));\n    Object.entries(views).forEach(([k, el]) => { el.style.display = k === n.view ? '' : 'none'; });\n    if (n.target) {\n      const sec = document.getElementById(n.target);\n      const top = n.target === 'sec-inicio' ? 0 : sec.offsetTop - 16;\n      mainScroll.scrollTo({ top, behavior: 'smooth' });\n    } else {\n      mainScroll.scrollTo({ top: 0 });\n    }\n  }\n  navEl.querySelectorAll('.sb-item').forEach((b) => {\n    b.addEventListener('click', () => go(NAV.find(x => x.id === b.dataset.nav)));\n  });\n\n  lucide.createIcons();\n<\u002Fscript>\n\n\n<\u002Fbody><\u002Fhtml>"
  </script>
